<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Elevator System</title>
        <style>
            body,html{
                margin: 0;
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
                background-color: #ffffff
            }

            .main_Container{
                width: 400px;
                height: 90vh;
                display: flex;
                flex-direction: column;
            }

            .floors_container{
            flex-grow: 1;
            border: 5px solid #333;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            }

            .floor_container{ 
                flex:1;
                border-bottom: 1px solid #eee;
                display: flex;
                justify-content: flex-end;
                align-items: center;
                padding-right: 20px;
                box-sizing: border-box;
            }

            .lift {
            width: 50px;
            /* Înălțimea liftului e calculată automat: 100% divizat la 7 etaje */
            height: calc(100% / 7); 
            position: absolute;
            transition: bottom 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        #lift_A {
            background-color: #e74c3c;
            left: 10px;
            bottom: 0%; /* Începe la parter */
        }

        #lift_B {
            background-color: #3498db;
            left: 70px;
            bottom: calc(100% - (100% / 7)); /* Începe la ultimul etaj */
        }
        </style>
    </head>


<body>
    <div class="main_Container">
        <h2>Elevator Control!</h2>

        <div class="floors_container">
        
                <div class="lift" id="lift_A" >Lift A</div>
                <div class="lift" id="lift_B" >Lift B </div>
            

                <div class="floor_container" id="floor_7">
                    <button onclick="moveLift(7)">&#9660;</button>
                    <span>Etaj 6</span>
                </div>
                <div class="floor_container" id="floor_6">
                    <button onclick="moveLift(6)">&#9650;</button>
                    <button onclick="moveLift(6)">&#9660;</button>
                    <span>Etaj 5</span>
                </div>
                <div class="floor_container" id="floor_5">
                    <button onclick="moveLift(5)">&#9650;</button>
                    <button onclick="moveLift(5)">&#9660;</button>
                    <span>Etaj 4</span>
                </div> 
                <div class="floor_container" id="floor_4">
                    <button onclick="moveLift(4)">&#9650;</button>
                    <button onclick="moveLift(4)">&#9660;</button>
                    <span>Etaj 3</span>
                </div>
                <div class="floor_container" id="floor_3">
                    <button onclick="moveLift(3)">&#9650;</button>
                    <button onclick="moveLift(3)">&#9660;</button>
                    <span>Etaj 2</span>
                </div>
                <div class="floor_container" id="floor_2">
                    <button onclick="moveLift(2)">&#9650;</button>
                    <button onclick="moveLift(2)">&#9660;</button>
                    <span>Etaj 1</span>
                </div>
                <div class="floor_container" id="floor_1">
                    <button onclick="moveLift(1)">&#9650;</button>
                    <span>Parter</span>
                </div>

     
    </div>
    </div>
    <script src="elevator.js"></script>
</body>
</html>
