<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Elevator System</title>
        <link rel="stylesheet" href="UI.css"/>
    </head>


<body>
    <div class="main_Container">
        <h2>Elevator Control</h2>

        <div class="floors_container">
        
        <div class="lift" id="lift_A" >
            <div class="left_door"></div>
            <div class="right_door"></div>
            <div class="floor_view">
            <div class="direction_arrows"> 
                <span id="up_A" class="arrow">▲</span>
            <span id="down_A" class="arrow">▼</span>
        </div>
        </div>
            <div id="floor_display_A">0</div>
            <span class="label">A</span>
        </div>


        <div class="lift" id="lift_B" >
            <div class="left_door"></div>
            <div class="right_door"></div>
            <div class="floor_view">
            <div class="direction_arrows"> 
                <span id="up_B" class="arrow">▲</span>
            <span id="down_B" class="arrow">▼</span>
        </div>
        </div>
            <div id="floor_display_B">0</div>
            <span class="label">B</span>
        </div>

            

                <div class="floor_container" id="floor_7">
                    <button onclick="moveLift(7)">&#9660;</button>
                    <span>Etaj 6</span>
                </div>
                <div class="floor_container" id="floor_6">
                    <button onclick="moveLift(6)">&#9650;</button>
                    <button onclick="moveLift(6)">&#9660;</button>
                    <span>Etaj 5</span>
                </div>
                <div class="floor_container" id="floor_5">
                    <button onclick="moveLift(5)">&#9650;</button>
                    <button onclick="moveLift(5)">&#9660;</button>
                    <span>Etaj 4</span>
                </div> 
                <div class="floor_container" id="floor_4">
                    <button onclick="moveLift(4)">&#9650;</button>
                    <button onclick="moveLift(4)">&#9660;</button>
                    <span>Etaj 3</span>
                </div>
                <div class="floor_container" id="floor_3">
                    <button onclick="moveLift(3)">&#9650;</button>
                    <button onclick="moveLift(3)">&#9660;</button>
                    <span>Etaj 2</span>
                </div>
                <div class="floor_container" id="floor_2">
                    <button onclick="moveLift(2)">&#9650;</button>
                    <button onclick="moveLift(2)">&#9660;</button>
                    <span>Etaj 1</span>
                </div>
                <div class="floor_container" id="floor_1">
                    <button onclick="moveLift(1)">&#9650;</button>
                    <span>Parter</span>
                </div>
    </div>
    </div>

    <div class=interior_control_pannels>
        <div class="pannel" id="pannel_A">
            <span>Controls Lift A</span>
            <div class="view_pannel" id="view_pannel_A">--</div>
            <div class="grid_buttons" id="internal_buttons_A">
                <button class="int-btn" onclick="pressInternal(1, 'A')">0</button>
                <button class="int-btn" onclick="pressInternal(2, 'A')">1</button>
                <button class="int-btn" onclick="pressInternal(3, 'A')">2</button>
                <button class="int-btn" onclick="pressInternal(4, 'A')">3</button>
                <button class="int-btn" onclick="pressInternal(5, 'A')">4</button>
                <button class="int-btn" onclick="pressInternal(6, 'A')">5</button>
                <button class="int-btn" onclick="pressInternal(7, 'A')">6</button>
            </div>
            <div class="state" id="state-A">IDLE</div>
        </div>

        <div class="pannel" id="pannel_B">
            <span>Controls Lift B</span>
            <div class="view_pannel" id="view_pannel_B">--</div>
            <div class="grid_buttons" id="internal_buttons_B">
                <button class="int-btn" onclick="pressInternal(1, 'B')">0</button>
                <button class="int-btn" onclick="pressInternal(2, 'B')">1</button>
                <button class="int-btn" onclick="pressInternal(3, 'B')">2</button>
                <button class="int-btn" onclick="pressInternal(4, 'B')">3</button>
                <button class="int-btn" onclick="pressInternal(5, 'B')">4</button>
                <button class="int-btn" onclick="pressInternal(6, 'B')">5</button>
                <button class="int-btn" onclick="pressInternal(7, 'B')">6</button>
            </div>
                <div class="state" id="state-B">IDLE</div>
        </div>

    </div>

    <script src="elevator.js"></script>
</body>
</html>
